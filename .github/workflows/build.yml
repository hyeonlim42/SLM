name: Build Desktop Installers

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: --windows
            artifact_path: dist/*.exe
          - os: macos-latest
            target: --mac
            artifact_path: dist/*.dmg
          - os: ubuntu-latest
            target: --linux
            artifact_path: dist/*.AppImage

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies
        working-directory: ./my-slm-app
        run: npm install

      - name: Compile OS Specific Installer
        working-directory: ./my-slm-app
        run: npx electron-builder ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: my-slm-app/${{ matrix.artifact_path }}
